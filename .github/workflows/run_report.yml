name: Generate Kinsta Weekly Report

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permette di avviare il test manualmente dall'interfaccia GitHub

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenjp2-7 libfreetype6-dev libpng-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Installazione forzata delle versioni più stabili
          pip install requests google-generativeai matplotlib fpdf2

      - name: Execute Report Script
        env:
          KINSTA_API_KEY: ${{ secrets.KINSTA_API_KEY }}
          KINSTA_SITE_ID: ${{ secrets.KINSTA_SITE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Upload Generated PDF
        uses: actions/upload-artifact@v4
        with:
          name: Kinsta-Weekly-Report
          path: Kinsta_Weekly_Report.pdf
          retention-days: 5
